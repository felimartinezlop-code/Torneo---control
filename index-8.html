// ─── FIREBASE DB LAYER ───

// Firestore does NOT accept undefined values — this sanitizer replaces them with null recursively
function sanitizeForFirestore(obj) {
  if (obj === undefined) return null;
  if (obj === null || typeof obj !== 'object') return obj;
  if (Array.isArray(obj)) return obj.map(item => sanitizeForFirestore(item));
  const clean = {};
  for (const key in obj) {
    if (Object.prototype.hasOwnProperty.call(obj, key)) {
      const val = obj[key];
      clean[key] = val === undefined ? null : sanitizeForFirestore(val);
    }
  }
  return clean;
}

async function loadDB(uid) {
  try {
    const snap = await fbDb.collection("users").doc(uid).collection("tournaments").get();
    const tournaments = [];
    snap.forEach(doc => tournaments.push({ id: doc.id, ...doc.data() }));
    return { tournaments };
  } catch(e) { console.error("loadDB error:", e); return { tournaments: [] }; }
}

async function saveDB(data, uid) {
  // Not used in Firebase mode - we save individual tournaments
}

async function saveTournament(uid, tournament) {
  try {
    const clean = sanitizeForFirestore(tournament);
    await fbDb.collection("users").doc(uid).collection("tournaments").doc(tournament.id).set(clean);
  } catch(e) { console.error("saveTournament error:", e); alert("Error guardando torneo: " + e.message); }
}

async function deleteTournament(uid, tournamentId) {
  try {
    await fbDb.collection("users").doc(uid).collection("tournaments").doc(tournamentId).delete();
  } catch(e) { console.error("deleteTournament error:", e); }
}

async function saveUserProfile(uid, profile) {
  try { await fbDb.collection("users").doc(uid).set(profile, { merge: true }); } catch(e) { console.error(e); }
}

async function getUserProfile(uid) {
  try {
    const doc = await fbDb.collection("users").doc(uid).get();
    return doc.exists ? doc.data() : null;
  } catch(e) { return null; }
}

// Load a shared tournament by shareCode (anfitrionUid + tournamentId)
async function loadSharedTournament(anfitrionUid, tournamentId) {
  try {
    const doc = await fbDb.collection("users").doc(anfitrionUid).collection("tournaments").doc(tournamentId).get();
    return doc.exists ? { id: doc.id, ...doc.data() } : null;
  } catch(e) { return null; }
}

// Load all tournaments for a given anfitrion (for jugador view)
async function loadAnfitrionTournaments(anfitrionUid) {
  try {
    const snap = await fbDb.collection("users").doc(anfitrionUid).collection("tournaments").get();
    const tournaments = [];
    snap.forEach(doc => tournaments.push({ id: doc.id, ...doc.data() }));
    return tournaments;
  } catch(e) { return []; }
}

function AuthScreen({ onAuth }) {
  const [mode, setMode] = useState("login"); // login, register
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [name, setName] = useState("");
  const [role, setRole] = useState("anfitrion");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const handleSubmit = async () => {
    setError(""); setLoading(true);
    try {
      if (mode === "register") {
        if (!name.trim()) { setError("Ingresá tu nombre"); setLoading(false); return; }
        const cred = await fbAuth.createUserWithEmailAndPassword(email, password);
        await saveUserProfile(cred.user.uid, { name: name.trim(), email, role, createdAt: new Date().toISOString() });
        onAuth(cred.user, { name: name.trim(), email, role });
      } else {
        const cred = await fbAuth.signInWithEmailAndPassword(email, password);
        const profile = await getUserProfile(cred.user.uid);
        onAuth(cred.user, profile);
      }
    } catch(e) {
      const msgs = {
        "auth/email-already-in-use": "Este correo ya está registrado",
        "auth/weak-password": "La contraseña debe tener al menos 6 caracteres",
        "auth/invalid-email": "Correo inválido",
        "auth/user-not-found": "No existe una cuenta con ese correo",
        "auth/wrong-password": "Contraseña incorrecta",
        "auth/invalid-credential": "Correo o contraseña incorrectos",
        "auth/too-many-requests": "Demasiados intentos, esperá un momento",
      };
      setError(msgs[e.code] || e.message);
    }
    setLoading(false);
  };

  const ipStyle = { width: "100%", padding: "12px 14px", background: "rgba(15,15,25,0.8)", border: "1px solid rgba(251,191,36,0.15)", borderRadius: 8, color: "#e5e7eb", fontFamily: "'Nunito Sans', sans-serif", fontSize: 14 };
  const lblStyle = { display: "block", fontSize: 9, color: "#fbbf24", fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 2, marginBottom: 6, marginTop: 14 };

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(170deg, #08080f, #0d0d1a, #111122, #08080f)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=Nunito+Sans:wght@300;400;500;600;700;800&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        input:focus { outline: none; border-color: #fbbf24 !important; box-shadow: 0 0 0 3px rgba(251,191,36,0.15); }
      `}</style>

      <div style={{ width: "100%", maxWidth: 420, animation: "fadeUp 0.5s ease" }}>
        {/* Logo */}
        <div style={{ textAlign: "center", marginBottom: 36 }}>
          <div style={{ fontSize: 56, marginBottom: 8 }}>🏆</div>
          <h1 style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 36, color: "#fbbf24", letterSpacing: 4 }}>TORNEO CONTROL</h1>
          <p style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "#4b5563", letterSpacing: 2, marginTop: 4 }}>SISTEMA DE GESTIÓN DE TORNEOS</p>
        </div>

        {/* Card */}
        <div style={{ background: "rgba(13,13,26,0.8)", border: "1px solid rgba(251,191,36,0.1)", borderRadius: 14, padding: "28px 24px", backdropFilter: "blur(12px)" }}>
          {/* Tabs */}
          <div style={{ display: "flex", marginBottom: 20, background: "rgba(15,15,25,0.5)", borderRadius: 8, padding: 3 }}>
            <button onClick={() => { setMode("login"); setError(""); }}
              style={{ flex: 1, padding: "10px", fontSize: 12, fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, background: mode === "login" ? "rgba(251,191,36,0.12)" : "transparent", border: "none", borderRadius: 6, color: mode === "login" ? "#fbbf24" : "#6b7280", cursor: "pointer", letterSpacing: 1 }}>
              INGRESAR
            </button>
            <button onClick={() => { setMode("register"); setError(""); }}
              style={{ flex: 1, padding: "10px", fontSize: 12, fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, background: mode === "register" ? "rgba(251,191,36,0.12)" : "transparent", border: "none", borderRadius: 6, color: mode === "register" ? "#fbbf24" : "#6b7280", cursor: "pointer", letterSpacing: 1 }}>
              REGISTRARSE
            </button>
          </div>

          {/* Name (register only) */}
          {mode === "register" && (
            <div>
              <label style={lblStyle}>NOMBRE</label>
              <input style={ipStyle} value={name} onChange={e => setName(e.target.value)} placeholder="Tu nombre" />
            </div>
          )}

          <label style={lblStyle}>CORREO ELECTRÓNICO</label>
          <input style={ipStyle} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="correo@ejemplo.com"
            onKeyDown={e => e.key === "Enter" && handleSubmit()} />

          <label style={lblStyle}>CONTRASEÑA</label>
          <input style={ipStyle} type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••"

                  <div style={{ fontSize: 9, color: role === "anfitrion" ? "#d1a821" : "#4b5563", marginTop: 2 }}>Crea y gestiona torneos</div>
                </button>
                <button onClick={() => setRole("jugador")}
                  style={{ padding: "14px 10px", background: role === "jugador" ? "rgba(96,165,250,0.1)" : "rgba(15,15,25,0.5)", border: `1px solid ${role === "jugador" ? "#60a5fa" : "rgba(251,191,36,0.08)"}`, borderRadius: 8, cursor: "pointer", textAlign: "center" }}>
                  <div style={{ fontSize: 22, marginBottom: 4 }}>⚽</div>
                  <div style={{ fontSize: 12, fontWeight: 700, color: role === "jugador" ? "#60a5fa" : "#9ca3af", fontFamily: "'Nunito Sans', sans-serif" }}>Jugador</div>
                  <div style={{ fontSize: 9, color: role === "jugador" ? "#3b82f6" : "#4b5563", marginTop: 2 }}>Ve tablas, partidos y premios</div>
                </button>
              </div>
            </div>
          )}

          {/* Error */}
          {error && (
            <div style={{ marginTop: 14, padding: "10px 14px", background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 6 }}>
              <p style={{ fontSize: 12, color: "#f87171" }}>{error}</p>
            </div>
          )}

          {/* Submit */}
          <button onClick={handleSubmit} disabled={loading}
            style={{ width: "100%", padding: "14px", marginTop: 20, fontSize: 14, fontFamily: "'IBM Plex Mono', monospace", fontWeight: 700, background: loading ? "#4b5563" : "linear-gradient(135deg, #a16207, #ca8a04)", border: "1px solid #fbbf24", borderRadius: 8, color: "#fff", cursor: loading ? "wait" : "pointer", letterSpacing: 1 }}>
            {loading ? "CARGANDO..." : mode === "login" ? "INGRESAR" : "CREAR CUENTA"}
          </button>
        </div>

        <p style={{ textAlign: "center", fontSize: 9, color: "#2a2a3e", fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 2, marginTop: 20 }}>TORNEO CONTROL v2.0</p>
      </div>
    </div>
  );
}

// ─── JUGADOR VIEW (read-only) ───
function JugadorView({ user, profile, onLogout }) {
  const [code, setCode] = useState("");
  const [following, setFollowing] = useState([]); // [{anfitrionUid, tournaments: [...]}]
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [viewTournament, setViewTournament] = useState(null);
  const [viewAnfitrionUid, setViewAnfitrionUid] = useState(null);
  const [time, setTime] = useState(new Date());
  const [savedCodes, setSavedCodes] = useState([]);

  useEffect(() => { const t = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(t); }, []);

  // Load saved codes from user profile
  useEffect(() => {
    (async () => {
      const p = await getUserProfile(user.uid);
      if (p?.followingCodes) {
        setSavedCodes(p.followingCodes);
        // Load all followed tournaments
        for (const c of p.followingCodes) {
          const ts = await loadAnfitrionTournaments(c);
          if (ts.length > 0) setFollowing(prev => [...prev.filter(f => f.anfitrionUid !== c), { anfitrionUid: c, tournaments: ts }]);
        }
      }
    })();
  }, [user.uid]);

  const joinCode = async () => {
    if (!code.trim()) return;
    setError(""); setLoading(true);
    const uid = code.trim();
    const ts = await loadAnfitrionTournaments(uid);
    if (ts.length === 0) {
      setError("No se encontraron torneos con ese código. Pedile el código al anfitrión.");
    } else {
      setFollowing(prev => [...prev.filter(f => f.anfitrionUid !== uid), { anfitrionUid: uid, tournaments: ts }]);
      const newCodes = [...new Set([...savedCodes, uid])];
      setSavedCodes(newCodes);
      await saveUserProfile(user.uid, { followingCodes: newCodes });
      setCode("");
    }
    setLoading(false);
  };

  const refreshAll = async () => {
    setLoading(true);
    const updated = [];
    for (const c of savedCodes) {
      const ts = await loadAnfitrionTournaments(c);
      if (ts.length > 0) updated.push({ anfitrionUid: c, tournaments: ts });
    }
    setFollowing(updated);
    setLoading(false);
  };

  // If viewing a specific tournament
  if (viewTournament && viewAnfitrionUid) {
    const group = following.find(f => f.anfitrionUid === viewAnfitrionUid);
    const t = group?.tournaments.find(t => t.id === viewTournament);
    if (t) {
      return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(170deg, #08080f 0%, #0d0d1a 30%, #111122 60%, #08080f 100%)", color: "#e5e7eb", fontFamily: "'Nunito Sans', sans-serif" }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=Nunito+Sans:wght@300;400;500;600;700;800&display=swap');
            * { box-sizing: border-box; margin: 0; padding: 0; }
            ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: rgba(10,10,20,0.5); } ::-webkit-scrollbar-thumb { background: #2a1f00; border-radius: 3px; }
          `}</style>
          <TournamentView tournament={t} onUpdate={() => {}} onBack={() => { setViewTournament(null); setViewAnfitrionUid(null); refreshAll(); }} readOnly={true} />
        </div>
      );
    }
  }

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(170deg, #08080f 0%, #0d0d1a 30%, #111122 60%, #08080f 100%)", color: "#e5e7eb", fontFamily: "'Nunito Sans', sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=Nunito+Sans:wght@300;400;500;600;700;800&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: rgba(10,10,20,0.5); } ::-webkit-scrollbar-thumb { background: #2a1f00; border-radius: 3px; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        input:focus { outline: none; border-color: #fbbf24 !important; box-shadow: 0 0 0 2px rgba(251,191,36,0.15); }
      `}</style>

      {/* Header */}
      <header style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 24px", borderBottom: "1px solid rgba(251,191,36,0.1)", background: "rgba(13,13,26,0.9)", backdropFilter: "blur(12px)", position: "sticky", top: 0, zIndex: 10, flexWrap: "wrap", gap: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 26 }}>⚽</span>
          <div>
            <h1 style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 20, color: "#60a5fa", letterSpacing: 3 }}>MODO JUGADOR</h1>
            <p style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 8, color: "#4b5563", letterSpacing: 2 }}>{profile?.name || user.email}</p>
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, color: "#fbbf24" }}>
            {time.toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit" })}
          </span>
          <button onClick={onLogout} style={{ padding: "5px 12px", fontSize: 10, fontFamily: "'IBM Plex Mono', monospace", background: "transparent", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 4, color: "#f87171", cursor: "pointer" }}>Salir</button>
        </div>
      </header>

      <main style={{ padding: "20px 24px" }}>
        {/* Enter code */}
        <div style={{ background: "rgba(15,15,25,0.6)", border: "1px solid rgba(96,165,250,0.1)", borderRadius: 10, padding: 18, marginBottom: 20 }}>
          <label style={{ fontSize: 9, color: "#60a5fa", fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 2 }}>CÓDIGO DEL ANFITRIÓN</label>
          <p style={{ fontSize: 11, color: "#6b7280", marginTop: 2, marginBottom: 8 }}>Pedile el código al organizador del torneo para ver sus torneos</p>
          <div style={{ display: "flex", gap: 8 }}>
            <input value={code} onChange={e => setCode(e.target.value)} placeholder="Pegar código del anfitrión"
              onKeyDown={e => e.key === "Enter" && joinCode()}
              style={{ flex: 1, padding: "10px 12px", background: "rgba(15,15,25,0.8)", border: "1px solid rgba(251,191,36,0.1)", borderRadius: 6, color: "#e5e7eb", fontFamily: "'Nunito Sans', sans-serif", fontSize: 13 }} />
            <button onClick={joinCode} disabled={loading}
              style={{ padding: "10px 18px", fontSize: 12, fontFamily: "'IBM Plex Mono', monospace", background: "linear-gradient(135deg, #1d4ed8, #2563eb)", border: "1px solid #60a5fa", borderRadius: 6, color: "#fff", cursor: "pointer", fontWeight: 600 }}>
              {loading ? "..." : "Unirme"}
            </button>
          </div>
          {error && <p style={{ fontSize: 11, color: "#f87171", marginTop: 6 }}>{error}</p>}
        </div>

        {/* Followed tournaments */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <h2 style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 20, color: "#d1d5db", letterSpacing: 2 }}>Torneos Seguidos</h2>
          {savedCodes.length > 0 && (
            <button onClick={refreshAll} style={{ padding: "5px 12px", fontSize: 10, fontFamily: "'IBM Plex Mono', monospace", background: "transparent", border: "1px solid rgba(251,191,36,0.1)", borderRadius: 4, color: "#fbbf24", cursor: "pointer" }}>↻ Actualizar</button>
          )}
        </div>

        {following.length === 0 ? (
          <div style={{ textAlign: "center", padding: "60px 20px" }}>
            <div style={{ fontSize: 48, opacity: 0.3 }}>⚽</div>
            <p style={{ color: "#6b7280", fontSize: 14, marginTop: 12 }}>No seguís ningún torneo</p>
            <p style={{ color: "#4b5563", fontSize: 12, marginTop: 4 }}>Ingresá el código que te dio el organizador</p>
          </div>
        ) : (
          following.map(group => group.tournaments.map(t => {
            const preset = SPORTS_PRESETS[t.sport] || SPORTS_PRESETS.personalizado;
            const played = t.matches.filter(m => m.played && !m.isBye).length;
            const total = t.matches.filter(m => !m.isBye).length;
            return (
              <div key={t.id} onClick={() => { setViewTournament(t.id); setViewAnfitrionUid(group.anfitrionUid); }}
                style={{ background: "rgba(15,15,25,0.6)", border: "1px solid rgba(251,191,36,0.06)", borderRadius: 10, padding: 16, marginBottom: 10, cursor: "pointer", animation: "fadeUp 0.3s ease" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span style={{ fontSize: 24 }}>{preset.icon}</span>
                  <div>
                    <h3 style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 18, color: "#f3f4f6", letterSpacing: 1 }}>{t.name}</h3>
                    <p style={{ fontSize: 10, color: "#fbbf24", fontFamily: "'IBM Plex Mono', monospace" }}>
                      {preset.name} • {t.format === "eliminacion" ? "Eliminación" : "Liga"} • {t.teams.length} equipos
                    </p>
                  </div>
                </div>
                <div style={{ marginTop: 8, height: 3, background: "rgba(251,191,36,0.08)", borderRadius: 2, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${total > 0 ? (played / total) * 100 : 0}%`, background: "linear-gradient(90deg, #b45309, #fbbf24)", borderRadius: 2 }} />
                </div>
                <p style={{ fontSize: 10, color: "#6b7280", marginTop: 4 }}>{played}/{total} partidos jugados</p>
              </div>
            );
          }))
        )}
      </main>
    </div>
  );
}
const SPORTS_PRESETS = {

const genId = () => Date.now().toString(36) + Math.random().toString(36).substring(2, 6);


function calcStandings(tournament) {
  const { teams, matches, sport } = tournament;
  const preset = SPORTS_PRESETS[sport] || SPORTS_PRESETS.personalizado;
  const map = {};
  teams.forEach(t => { map[t.id] = { ...t, PJ: 0, PG: 0, PE: 0, PP: 0, SF: 0, SC: 0, DIFF: 0, PTS: 0 }; });
  matches.filter(m => m.played).forEach(m => {
    const h = map[m.homeId], a = map[m.awayId];
    if (!h || !a) return;
    h.PJ++; a.PJ++;
    h.SF += m.homeScore; h.SC += m.awayScore;
    a.SF += m.awayScore; a.SC += m.homeScore;
    if (m.homeScore > m.awayScore) { h.PG++; h.PTS += 3; a.PP++; }
    else if (m.homeScore < m.awayScore) { a.PG++; a.PTS += 3; h.PP++; }
    else { h.PE++; a.PE++; h.PTS += 1; a.PTS += 1; }
    h.DIFF = h.SF - h.SC; a.DIFF = a.SF - a.SC;
  });
  return Object.values(map).sort((a, b) => b.PTS - a.PTS || b.DIFF - a.DIFF || b.SF - a.SF);
}

function generateRoundRobin(teamIds) {
  const ids = [...teamIds];
  if (ids.length % 2 !== 0) ids.push(null);
  const n = ids.length;
  const rounds = [];
  for (let r = 0; r < n - 1; r++) {
    const round = [];
    for (let i = 0; i < n / 2; i++) {
      const home = ids[i], away = ids[n - 1 - i];
      if (home && away) round.push({ id: genId(), homeId: home, awayId: away, homeScore: 0, awayScore: 0, played: false, round: r + 1 });
    }
    rounds.push(...round);
    ids.splice(1, 0, ids.pop());
  }
  return rounds;
}

function getBracketRoundName(roundNum, totalRounds) {
  const fromFinal = totalRounds - roundNum;
  if (fromFinal === 0) return "Final";
  if (fromFinal === 1) return "Semifinal";
  if (fromFinal === 2) return "Cuartos de Final";
  if (fromFinal === 3) return "Octavos de Final";
  if (fromFinal === 4) return "Dieciseisavos";
  return `Ronda ${roundNum}`;
}

function generateBracket(teamIds) {
  let n = teamIds.length;
  // Pad to next power of 2
  let size = 1;
  while (size < n) size *= 2;
  const padded = [...teamIds];
  while (padded.length < size) padded.push(null); // byes

  // Seed so 1 vs last, 2 vs second-last, etc
  const seeded = [];
  for (let i = 0; i < size / 2; i++) {
    seeded.push(padded[i], padded[size - 1 - i]);
  }

  const totalRounds = Math.log2(size);
  const matches = [];

  // First round
  for (let i = 0; i < size; i += 2) {
    const home = seeded[i], away = seeded[i + 1];
    const isBye = !home || !away;
    matches.push({
      id: genId(), bracketRound: 1, bracketPos: i / 2,
      homeId: home || null, awayId: away || null,
      homeScore: 0, awayScore: 0,
      played: isBye, isBye,
      winnerId: isBye ? (home || away) : null,
    });
  }

  // Subsequent rounds (empty, to be filled by winners)
  let prevCount = size / 2;
  for (let r = 2; r <= totalRounds; r++) {
    const count = prevCount / 2;
    for (let i = 0; i < count; i++) {
      matches.push({
        id: genId(), bracketRound: r, bracketPos: i,
        homeId: null, awayId: null,
        homeScore: 0, awayScore: 0,
        played: false, isBye: false, winnerId: null,
      });
    }
    prevCount = count;
  }

  return { matches, totalRounds };
}

function advanceBracketWinner(allMatches, match, winnerId, totalRounds) {
  const updated = allMatches.map(m => m.id === match.id ? { ...m, winnerId } : m);
  if (match.bracketRound >= totalRounds) return updated;

  const nextRound = match.bracketRound + 1;
  const nextPos = Math.floor(match.bracketPos / 2);
  const isTop = match.bracketPos % 2 === 0;

  return updated.map(m => {
    if (m.bracketRound === nextRound && m.bracketPos === nextPos) {
      return isTop ? { ...m, homeId: winnerId } : { ...m, awayId: winnerId };
    }
    return m;
  });
}

  const [padelCurrentSet, setPadelCurrentSet] = useState(match.padelCurrentSet || { home: 0, away: 0 });
  const [padelDeuce, setPadelDeuce] = useState(null); // null, 'deuce', 'advHome', 'advAway'
  const [padelWinners, setPadelWinners] = useState(match.padelWinners || []);
  const [newWinnerName, setNewWinnerName] = useState("");
  const [newWinnerTeam, setNewWinnerTeam] = useState("");
  const [padelMode, setPadelMode] = useState("live"); // 'live' or 'manual'
  const [manualSets, setManualSets] = useState(match.padelSets || [{ home: 0, away: 0 }, { home: 0, away: 0 }, { home: 0, away: 0 }]);
  const [scorerName, setScorerName] = useState("");
  const [scorerTeam, setScorerTeam] = useState("");
  const [scorerGoals, setScorerGoals] = useState(1);
  const [tab, setTab] = useState("score");

  const home = teams.find(t => t.id === match.homeId);
  const away = teams.find(t => t.id === match.awayId);
  const preset = SPORTS_PRESETS[sportKey] || SPORTS_PRESETS.personalizado;
  const isFutbol = sportKey === "futbol" || sportKey === "hockey" || sportKey === "handball";
  const isPoints = sportKey === "basquetbol" || sportKey === "americano" || sportKey === "rugby" || sportKey === "handball";
  const isPadel = sportKey === "padel";

  const PADEL_POINTS = ["0", "15", "30", "40"];
  const matchFinished = padelSets.filter(s => s.home > s.away).length >= 2 || padelSets.filter(s => s.away > s.home).length >= 2;

  const padelAwardPoint = (side) => {
    if (matchFinished) return;
    const other = side === "home" ? "away" : "home";

    // Deuce logic
    if (padelDeuce) {
      if (padelDeuce === "deuce") {
        setPadelDeuce(side === "home" ? "advHome" : "advAway");
        return;
      }
      if ((padelDeuce === "advHome" && side === "home") || (padelDeuce === "advAway" && side === "away")) {
        padelWinGame(side);
        return;
      }
      setPadelDeuce("deuce");
      return;
    }

    const cur = { ...padelCurrentGame };
    if (cur[side] === 3 && cur[other] === 3) {
      setPadelDeuce("deuce");
      return;
    }
    if (cur[side] >= 3) {
      padelWinGame(side);
      return;
    }
    cur[side]++;
    if (cur[side] > 3) {
      padelWinGame(side);
    } else {
      setPadelCurrentGame(cur);
    }
  };

  const padelWinGame = (side) => {
    setPadelCurrentGame({ home: 0, away: 0 });
    setPadelDeuce(null);
    const newSet = { ...padelCurrentSet };
    newSet[side]++;

    // Check if set is won
    const isTiebreak = newSet.home >= 6 && newSet.away >= 6;
    const setWon = (newSet[side] >= 6 && newSet[side] - newSet[side === "home" ? "away" : "home"] >= 2) ||
                   (isTiebreak && newSet[side] >= 7);

    if (setWon) {
      const newSets = [...padelSets, { home: newSet.home, away: newSet.away }];
      setPadelSets(newSets);
      setPadelCurrentSet({ home: 0, away: 0 });
      // Update main scores (sets won)
      const homeSetsWon = newSets.filter(s => s.home > s.away).length;
      const awaySetsWon = newSets.filter(s => s.away > s.home).length;
      setHs(homeSetsWon);
      setAs(awaySetsWon);
    } else {
      setPadelCurrentSet(newSet);
    }
  };

  const padelResetScore = () => {
    setPadelSets([]);
    setPadelCurrentSet({ home: 0, away: 0 });
    setPadelCurrentGame({ home: 0, away: 0 });
    setPadelDeuce(null);
    setHs(0); setAs(0);
  };

  const applyManualSets = () => {
    const valid = manualSets.filter(s => s.home > 0 || s.away > 0);
    setPadelSets(valid);
    const homeSetsWon = valid.filter(s => s.home > s.away).length;
    const awaySetsWon = valid.filter(s => s.away > s.home).length;
    setHs(homeSetsWon); setAs(awaySetsWon);
  };

  // Winners helpers
  const addWinner = () => {
    if (!newWinnerName.trim() || !newWinnerTeam) return;
    if (padelWinners.find(w => w.name === newWinnerName.trim() && w.teamId === newWinnerTeam)) return;
    setPadelWinners(p => [...p, { id: genId(), name: newWinnerName.trim(), teamId: newWinnerTeam, count: 0 }]);
    setNewWinnerName("");
  };
  const updateWinnerCount = (id, val) => setPadelWinners(p => p.map(w => w.id === id ? { ...w, count: Math.max(0, val) } : w));
  const removeWinner = (id) => setPadelWinners(p => p.filter(w => w.id !== id));

  const addScorer = () => {
    if (!scorerName.trim() || !scorerTeam) return;
    setScorers(p => [...p, { id: genId(), name: scorerName.trim(), teamId: scorerTeam, goals: scorerGoals }]);
    setScorerName(""); setScorerGoals(1);
  };
  const removeScorer = (id) => setScorers(p => p.filter(s => s.id !== id));

  const setRating = (playerName, teamId, value) => {
    setRatings(p => {
      const exists = p.find(r => r.name === playerName && r.teamId === teamId);
      if (exists) return p.map(r => r.name === playerName && r.teamId === teamId ? { ...r, rating: value } : r);
      return [...p, { id: genId(), name: playerName, teamId, rating: value }];
    });
  };
  const addPlayerRating = (name, teamId) => {
    if (!name.trim()) return;
    if (ratings.find(r => r.name === name.trim() && r.teamId === teamId)) return;
    setRatings(p => [...p, { id: genId(), name: name.trim(), teamId, rating: 5 }]);
  };
  const removeRating = (id) => setRatings(p => p.filter(r => r.id !== id));

  const setGkRating = (name, teamId, value) => {
    setGkRatings(p => {
      const exists = p.find(r => r.name === name && r.teamId === teamId);
      if (exists) return p.map(r => r.name === name && r.teamId === teamId ? { ...r, interventions: Math.max(0, value) } : r);
      return [...p, { id: genId(), name, teamId, interventions: Math.max(0, value) }];
    });
  };
  const addGkRating = (name, teamId) => {
    if (!name.trim()) return;
    if (gkRatings.find(r => r.name === name.trim() && r.teamId === teamId)) return;
    setGkRatings(p => [...p, { id: genId(), name: name.trim(), teamId, interventions: 0 }]);
  };
  const removeGkRating = (id) => setGkRatings(p => p.filter(r => r.id !== id));

  // Player stats (points per player for basketball etc)
  const [newStatName, setNewStatName] = useState("");
  const [newStatTeam, setNewStatTeam] = useState("");
  const addPlayerStat = () => {
    if (!newStatName.trim() || !newStatTeam) return;
    if (playerStats.find(p => p.name === newStatName.trim() && p.teamId === newStatTeam)) return;
    setPlayerStats(p => [...p, { id: genId(), name: newStatName.trim(), teamId: newStatTeam, points: 0 }]);
    setNewStatName("");
  };
  const updateStatPoints = (id, pts) => {
    setPlayerStats(p => p.map(s => s.id === id ? { ...s, points: Math.max(0, pts) } : s));
  };
  const removePlayerStat = (id) => setPlayerStats(p => p.filter(s => s.id !== id));

  const [newPlayerName, setNewPlayerName] = useState("");
  const [newPlayerTeam, setNewPlayerTeam] = useState("");
  const [newGkName, setNewGkName] = useState("");
  const [newGkTeam, setNewGkTeam] = useState("");

  return (
    <Modal onClose={onClose} width={520}>
      <div style={mh}><span style={mt}>REGISTRAR PARTIDO</span><button style={xb} onClick={onClose}>✕</button></div>
      <div style={{ display: "flex", gap: 2, padding: "8px 20px 0", borderBottom: "1px solid rgba(251,191,36,0.06)", flexWrap: "wrap" }}>
        {[
          { id: "score", label: isPadel ? "Marcador Pádel" : "Marcador" },
          ...(isFutbol ? [{ id: "scorers", label: "Goleadores" }] : []),
          ...(isPoints ? [{ id: "puntos", label: "Puntos x Jugador" }] : []),
          ...(isPadel ? [{ id: "winners", label: "Winners" }] : []),
          { id: "ratings", label: "Calificaciones" },
          ...(isFutbol ? [{ id: "gk", label: "Arqueros" }] : []),
        ].map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            style={{ padding: "6px 12px", fontSize: 10, fontFamily: "'IBM Plex Mono', monospace", background: tab === t.id ? "rgba(251,191,36,0.1)" : "transparent", border: "none", borderBottom: tab === t.id ? "2px solid #fbbf24" : "2px solid transparent", color: tab === t.id ? "#fbbf24" : "#6b7280", cursor: "pointer" }}>
            {t.label}
          </button>
        ))}
      </div>
      <div style={{ ...mb, maxHeight: 420 }}>
        {/* SCORE TAB */}
        {tab === "score" && !isPadel && (
          <div style={{ paddingTop: 10 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 16 }}>
              <div style={{ textAlign: "center", flex: 1 }}>
                <div style={{ width: 40, height: 40, borderRadius: "50%", background: home?.color || "#333", margin: "0 auto 8px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, fontWeight: 700, color: "#fff", border: "2px solid rgba(255,255,255,0.2)" }}>{home?.name?.charAt(0)}</div>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#f3f4f6" }}>{home?.name}</div>
                <input type="number" min={0} value={hs} onChange={e => setHs(Math.max(0, parseInt(e.target.value) || 0))}
                  style={{ ...ip, width: 80, textAlign: "center", fontSize: 28, fontFamily: "'Bebas Neue', sans-serif", padding: "8px", marginTop: 10, fontWeight: 700, color: "#fbbf24" }} />
              </div>
              <div style={{ fontSize: 20, color: "#4b5563", fontWeight: 700, marginTop: 30 }}>VS</div>
              <div style={{ textAlign: "center", flex: 1 }}>
                <div style={{ width: 40, height: 40, borderRadius: "50%", background: away?.color || "#333", margin: "0 auto 8px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, fontWeight: 700, color: "#fff", border: "2px solid rgba(255,255,255,0.2)" }}>{away?.name?.charAt(0)}</div>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#f3f4f6" }}>{away?.name}</div>
                <input type="number" min={0} value={as_} onChange={e => setAs(Math.max(0, parseInt(e.target.value) || 0))}
                  style={{ ...ip, width: 80, textAlign: "center", fontSize: 28, fontFamily: "'Bebas Neue', sans-serif", padding: "8px", marginTop: 10, fontWeight: 700, color: "#fbbf24" }} />
              </div>
            </div>
            <p style={{ textAlign: "center", fontSize: 10, color: "#6b7280", marginTop: 12, fontFamily: "'IBM Plex Mono', monospace" }}>{preset.scoreLabel}</p>
          </div>
        )}

        {/* PADEL SCORE TAB */}
        {tab === "score" && isPadel && (
          <div style={{ paddingTop: 10 }}>
            {/* Mode toggle */}
            <div style={{ display: "flex", gap: 4, marginBottom: 14, justifyContent: "center" }}>
              <button onClick={() => setPadelMode("live")} style={{ padding: "5px 14px", fontSize: 10, fontFamily: "'IBM Plex Mono', monospace", background: padelMode === "live" ? "rgba(34,197,94,0.15)" : "transparent", border: `1px solid ${padelMode === "live" ? "#22c55e" : "rgba(251,191,36,0.1)"}`, borderRadius: 4, color: padelMode === "live" ? "#22c55e" : "#6b7280", cursor: "pointer" }}>🎯 En Vivo</button>
              <button onClick={() => setPadelMode("manual")} style={{ padding: "5px 14px", fontSize: 10, fontFamily: "'IBM Plex Mono', monospace", background: padelMode === "manual" ? "rgba(251,191,36,0.15)" : "transparent", border: `1px solid ${padelMode === "manual" ? "#fbbf24" : "rgba(251,191,36,0.1)"}`, borderRadius: 4, color: padelMode === "manual" ? "#fbbf24" : "#6b7280", cursor: "pointer" }}>✏️ Manual</button>
            </div>

            {/* Team headers */}
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ width: 30, height: 30, borderRadius: "50%", background: home?.color || "#333", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 700, color: "#fff" }}>{home?.name?.charAt(0)}</div>
                <span style={{ fontSize: 13, fontWeight: 600, color: "#f3f4f6" }}>{home?.name}</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 13, fontWeight: 600, color: "#f3f4f6" }}>{away?.name}</span>
                <div style={{ width: 30, height: 30, borderRadius: "50%", background: away?.color || "#333", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 700, color: "#fff" }}>{away?.name?.charAt(0)}</div>
              </div>
            </div>

            {/* Completed sets display */}
            {padelSets.length > 0 && (
              <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 12 }}>
                {padelSets.map((s, i) => (
                  <div key={i} style={{ textAlign: "center", padding: "8px 14px", background: "rgba(15,15,25,0.6)", borderRadius: 6, border: "1px solid rgba(251,191,36,0.1)" }}>
                    <div style={{ fontSize: 7, color: "#6b7280", fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 1, marginBottom: 4 }}>SET {i + 1}</div>
                    <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 24, letterSpacing: 2 }}>
                      <span style={{ color: s.home > s.away ? "#22c55e" : "#ef4444" }}>{s.home}</span>
                      <span style={{ color: "#4b5563", margin: "0 4px" }}>-</span>
                      <span style={{ color: s.away > s.home ? "#22c55e" : "#ef4444" }}>{s.away}</span>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Match result */}
            {matchFinished && (
              <div style={{ textAlign: "center", padding: "12px", background: "linear-gradient(135deg, rgba(34,197,94,0.1), rgba(251,191,36,0.05))", borderRadius: 8, border: "1px solid rgba(34,197,94,0.2)", marginBottom: 12 }}>
                <div style={{ fontSize: 10, color: "#22c55e", fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 2, marginBottom: 4 }}>PARTIDO TERMINADO</div>
                <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 28, color: "#fbbf24" }}>
                  {padelSets.filter(s => s.home > s.away).length} - {padelSets.filter(s => s.away > s.home).length}
                </div>
                <div style={{ fontSize: 11, color: "#d1d5db", marginTop: 4 }}>
                  🏆 Ganador: <strong style={{ color: "#fbbf24" }}>{padelSets.filter(s => s.home > s.away).length > padelSets.filter(s => s.away > s.home).length ? home?.name : away?.name}</strong>
                </div>
              </div>
            )}

            {/* LIVE MODE */}
            {padelMode === "live" && !matchFinished && (
              <div>
                {/* Current set info */}
                <div style={{ textAlign: "center", marginBottom: 8 }}>
                  <span style={{ fontSize: 9, color: "#fbbf24", fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 2 }}>SET {padelSets.length + 1} — JUEGOS</span>
                  <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 30, color: "#d1d5db", letterSpacing: 4, marginTop: 4 }}>
                    {padelCurrentSet.home} - {padelCurrentSet.away}
                  </div>
                </div>

                {/* Current game points */}
                <div style={{ background: "rgba(15,15,25,0.7)", borderRadius: 10, padding: 16, border: "1px solid rgba(251,191,36,0.12)", marginBottom: 12 }}>
                  <div style={{ textAlign: "center", marginBottom: 10 }}>
                    <span style={{ fontSize: 8, color: "#6b7280", fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 2 }}>PUNTOS DEL GAME</span>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 20 }}>
                    <div style={{ textAlign: "center" }}>
                      <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 48, color: "#22c55e", lineHeight: 1 }}>
                        {padelDeuce === "advHome" ? "AD" : padelDeuce === "advAway" ? "—" : padelDeuce === "deuce" ? "40" : PADEL_POINTS[padelCurrentGame.home]}
                      </div>
                    </div>
                    <div style={{ fontSize: 14, color: "#374151" }}>:</div>
                    <div style={{ textAlign: "center" }}>
                      <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 48, color: "#22c55e", lineHeight: 1 }}>
                        {padelDeuce === "advAway" ? "AD" : padelDeuce === "advHome" ? "—" : padelDeuce === "deuce" ? "40" : PADEL_POINTS[padelCurrentGame.away]}
                      </div>
                    </div>
                  </div>
                  {padelDeuce && (
                    <div style={{ textAlign: "center", marginTop: 6 }}>
                      <span style={{ fontSize: 10, color: "#f59e0b", fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 1 }}>
                        {padelDeuce === "deuce" ? "DEUCE" : padelDeuce === "advHome" ? `VENTAJA ${home?.name}` : `VENTAJA ${away?.name}`}
                      </span>
                    </div>
                  )}
                </div>

                {/* Score buttons */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <button onClick={() => padelAwardPoint("home")}
                    style={{ padding: "14px", background: `linear-gradient(135deg, ${home?.color || "#333"}44, ${home?.color || "#333"}22)`, border: `2px solid ${home?.color || "#333"}`, borderRadius: 8, color: "#f3f4f6", cursor: "pointer", fontSize: 13, fontWeight: 700, fontFamily: "'Nunito Sans', sans-serif", transition: "all 0.15s" }}>
                    Punto {home?.name}
                  </button>
                  <button onClick={() => padelAwardPoint("away")}
                    style={{ padding: "14px", background: `linear-gradient(135deg, ${away?.color || "#333"}44, ${away?.color || "#333"}22)`, border: `2px solid ${away?.color || "#333"}`, borderRadius: 8, color: "#f3f4f6", cursor: "pointer", fontSize: 13, fontWeight: 700, fontFamily: "'Nunito Sans', sans-serif", transition: "all 0.15s" }}>
                    Punto {away?.name}
                  </button>
                </div>
                <button onClick={padelResetScore} style={{ ...cn, width: "100%", marginTop: 10, fontSize: 10 }}>↻ Reiniciar Marcador</button>
              </div>
            )}

            {/* MANUAL MODE */}
            {padelMode === "manual" && (
              <div>
                <p style={{ fontSize: 10, color: "#6b7280", marginBottom: 10, textAlign: "center" }}>Ingresá los juegos de cada set directamente</p>
                {manualSets.map((s, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, justifyContent: "center" }}>
                    <span style={{ fontSize: 9, color: "#6b7280", fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 1, width: 50 }}>SET {i + 1}</span>
                    <input type="number" min={0} max={7} value={s.home}
                      onChange={e => { const v = [...manualSets]; v[i] = { ...v[i], home: Math.max(0, Math.min(7, parseInt(e.target.value) || 0)) }; setManualSets(v); }}
                      style={{ ...ip, width: 50, textAlign: "center", fontSize: 20, fontFamily: "'Bebas Neue', sans-serif", padding: "6px", color: "#22c55e" }} />
                    <span style={{ fontSize: 14, color: "#4b5563", fontWeight: 700 }}>—</span>
                    <input type="number" min={0} max={7} value={s.away}
                      onChange={e => { const v = [...manualSets]; v[i] = { ...v[i], away: Math.max(0, Math.min(7, parseInt(e.target.value) || 0)) }; setManualSets(v); }}
                      style={{ ...ip, width: 50, textAlign: "center", fontSize: 20, fontFamily: "'Bebas Neue', sans-serif", padding: "6px", color: "#22c55e" }} />
                  </div>
                ))}
                <button onClick={applyManualSets} style={{ ...sv, width: "100%", marginTop: 8 }}>Aplicar Sets</button>
              </div>
            )}
          </div>
        )}

        {/* SCORERS TAB */}
        {tab === "scorers" && (
          <div style={{ paddingTop: 10 }}>
            <p style={{ fontSize: 11, color: "#9ca3af", marginBottom: 12 }}>Registra quién anotó en este partido</p>
            <div style={{ display: "grid", gridTemplateColumns: "1fr auto auto", gap: 6, alignItems: "end", marginBottom: 10 }}>
              <div>
                <label style={{ ...lb, fontSize: 8 }}>Jugador</label>
                <input style={ip} value={scorerName} onChange={e => setScorerName(e.target.value)} placeholder="Nombre del goleador"
                  onKeyDown={e => e.key === "Enter" && addScorer()} />
              </div>
              <div>
                <label style={{ ...lb, fontSize: 8 }}>Equipo</label>
                <select style={{ ...ip, minWidth: 100 }} value={scorerTeam} onChange={e => setScorerTeam(e.target.value)}>
                  <option value="">—</option>
                  <option value={home?.id}>{home?.name}</option>
                  <option value={away?.id}>{away?.name}</option>
                </select>
              </div>
              <div>
                <label style={{ ...lb, fontSize: 8 }}>Goles</label>
                <input type="number" min={1} value={scorerGoals} onChange={e => setScorerGoals(Math.max(1, parseInt(e.target.value) || 1))}
                  style={{ ...ip, width: 50, textAlign: "center" }} />
              </div>
            </div>
            <button onClick={addScorer} style={{ ...sv, width: "100%", fontSize: 11, padding: "6px" }}>⚽ Agregar Goleador</button>
            {scorers.length > 0 && (
              <div style={{ marginTop: 12 }}>
                {scorers.map(s => {
                  const team = teams.find(t => t.id === s.teamId);
                  return (
                    <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 8px", background: "rgba(15,15,25,0.5)", borderRadius: 4, marginBottom: 4, border: "1px solid rgba(251,191,36,0.05)" }}>
                      <div style={{ width: 16, height: 16, borderRadius: "50%", background: team?.color || "#333", flexShrink: 0 }} />
                      <span style={{ flex: 1, fontSize: 12, color: "#f3f4f6", fontWeight: 500 }}>{s.name}</span>
                      <span style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 18, color: "#fbbf24", minWidth: 24, textAlign: "center" }}>{s.goals}</span>
                      <span style={{ fontSize: 9, color: "#6b7280" }}>gol{s.goals > 1 ? "es" : ""}</span>
                      <button onClick={() => removeScorer(s.id)} style={{ background: "none", border: "none", color: "#4b5563", cursor: "pointer", fontSize: 11 }}>✕</button>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* PADEL WINNERS TAB */}
        {tab === "winners" && (
          <div style={{ paddingTop: 10 }}>
            <p style={{ fontSize: 11, color: "#9ca3af", marginBottom: 12 }}>Registra los winners de cada jugador en este partido. El sistema calcula el promedio por partido en Premios.</p>
            <div style={{ display: "flex", gap: 6, alignItems: "end", marginBottom: 10 }}>
              <div style={{ flex: 1 }}>
                <label style={{ ...lb, fontSize: 8 }}>Jugador</label>
                <input style={ip} value={newWinnerName} onChange={e => setNewWinnerName(e.target.value)} placeholder="Nombre del jugador"
                  onKeyDown={e => { if (e.key === "Enter" && newWinnerTeam) addWinner(); }} />
              </div>
              <div>
                <label style={{ ...lb, fontSize: 8 }}>Equipo</label>
                <select style={{ ...ip, minWidth: 100 }} value={newWinnerTeam} onChange={e => setNewWinnerTeam(e.target.value)}>
                  <option value="">—</option>
                  <option value={home?.id}>{home?.name}</option>
                  <option value={away?.id}>{away?.name}</option>
                </select>
              </div>
              <button onClick={addWinner} style={{ ...sv, fontSize: 16, padding: "6px 12px", minWidth: 38 }}>+</button>
            </div>

            {[home, away].map(team => {
              const teamW = padelWinners.filter(w => w.teamId === team?.id);
              if (teamW.length === 0) return null;
              const teamTotal = teamW.reduce((a, w) => a + w.count, 0);
              return (
                <div key={team?.id} style={{ marginBottom: 14 }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <div style={{ width: 14, height: 14, borderRadius: "50%", background: team?.color || "#333" }} />
                      <span style={{ fontSize: 11, fontWeight: 600, color: "#d1d5db" }}>{team?.name}</span>
                    </div>
                    <span style={{ fontSize: 10, color: "#22c55e", fontFamily: "'IBM Plex Mono', monospace" }}>Total: {teamTotal} winners</span>
                  </div>
                  {teamW.map(w => (
                    <div key={w.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 10px", background: "rgba(15,15,25,0.5)", borderRadius: 5, marginBottom: 3, border: "1px solid rgba(34,197,94,0.08)" }}>
                      <span style={{ flex: 1, fontSize: 12, color: "#f3f4f6", fontWeight: 500 }}>{w.name}</span>
                      <button onClick={() => updateWinnerCount(w.id, w.count - 1)} style={{ width: 24, height: 24, background: "rgba(239,68,68,0.15)", border: "1px solid rgba(239,68,68,0.3)", borderRadius: 4, color: "#ef4444", cursor: "pointer", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700 }}>−</button>
                      <input type="number" min={0} value={w.count} onChange={e => updateWinnerCount(w.id, parseInt(e.target.value) || 0)}
                        style={{ ...ip, width: 55, textAlign: "center", fontSize: 18, fontFamily: "'Bebas Neue', sans-serif", padding: "4px", color: "#22c55e", fontWeight: 700 }} />
                      <button onClick={() => updateWinnerCount(w.id, w.count + 1)} style={{ width: 24, height: 24, background: "rgba(34,197,94,0.15)", border: "1px solid rgba(34,197,94,0.3)", borderRadius: 4, color: "#22c55e", cursor: "pointer", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700 }}>+</button>
                      <span style={{ fontSize: 9, color: "#6b7280", fontFamily: "'IBM Plex Mono', monospace" }}>win</span>
                      <button onClick={() => removeWinner(w.id)} style={{ background: "none", border: "none", color: "#4b5563", cursor: "pointer", fontSize: 10 }}>✕</button>
                    </div>
                  ))}
                </div>
              );
            })}
            {padelWinners.length === 0 && (
              <p style={{ textAlign: "center", color: "#374151", fontSize: 11, padding: "20px 0", fontStyle: "italic" }}>Agregá jugadores para registrar sus winners</p>
            )}
          </div>
        )}

        {/* PLAYER POINTS TAB (Basketball etc) */}
        {tab === "puntos" && (
          <div style={{ paddingTop: 10 }}>
            <p style={{ fontSize: 11, color: "#9ca3af", marginBottom: 12 }}>Registra cuántos puntos anotó cada jugador en este partido. El sistema calcula el promedio automáticamente en la pestaña de Premios.</p>
            <div style={{ display: "flex", gap: 6, alignItems: "end", marginBottom: 10 }}>
              <div style={{ flex: 1 }}>
                <label style={{ ...lb, fontSize: 8 }}>Jugador</label>
                <input style={ip} value={newStatName} onChange={e => setNewStatName(e.target.value)} placeholder="Nombre del jugador"
                  onKeyDown={e => { if (e.key === "Enter" && newStatTeam) { addPlayerStat(); } }} />
              </div>
              <div>
                <label style={{ ...lb, fontSize: 8 }}>Equipo</label>
                <select style={{ ...ip, minWidth: 100 }} value={newStatTeam} onChange={e => setNewStatTeam(e.target.value)}>

                  <option value={home?.id}>{home?.name}</option>

                </select>
              </div>
              <button onClick={addPlayerStat} style={{ ...sv, fontSize: 16, padding: "6px 12px", minWidth: 38 }}>+</button>
            </div>

            {[home, away].map(team => {
              const teamStats = playerStats.filter(p => p.teamId === team?.id);
              if (teamStats.length === 0) return null;
              const teamTotal = teamStats.reduce((a, p) => a + p.points, 0);
              return (

                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>

                      <span style={{ fontSize: 11, fontWeight: 600, color: "#d1d5db" }}>{team?.name}</span>
                    </div>
                    <span style={{ fontSize: 10, color: "#fbbf24", fontFamily: "'IBM Plex Mono', monospace" }}>Total: {teamTotal} pts</span>

                    <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 10px", background: "rgba(15,15,25,0.5)", borderRadius: 5, marginBottom: 3, border: "1px solid rgba(251,191,36,0.05)" }}>
                      <span style={{ flex: 1, fontSize: 12, color: "#f3f4f6", fontWeight: 500 }}>{p.name}</span>
                      <button onClick={() => updateStatPoints(p.id, p.points - 1)} style={{ width: 24, height: 24, background: "rgba(239,68,68,0.15)", border: "1px solid rgba(239,68,68,0.3)", borderRadius: 4, color: "#ef4444", cursor: "pointer", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700 }}>−</button>
                      <input type="number" min={0} value={p.points} onChange={e => updateStatPoints(p.id, parseInt(e.target.value) || 0)}
                        style={{ ...ip, width: 60, textAlign: "center", fontSize: 18, fontFamily: "'Bebas Neue', sans-serif", padding: "4px", color: "#fbbf24", fontWeight: 700 }} />
                      <button onClick={() => updateStatPoints(p.id, p.points + 1)} style={{ width: 24, height: 24, background: "rgba(34,197,94,0.15)", border: "1px solid rgba(34,197,94,0.3)", borderRadius: 4, color: "#22c55e", cursor: "pointer", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700 }}>+</button>
                      <span style={{ fontSize: 9, color: "#6b7280", fontFamily: "'IBM Plex Mono', monospace", minWidth: 24 }}>pts</span>
                      <button onClick={() => removePlayerStat(p.id)} style={{ background: "none", border: "none", color: "#4b5563", cursor: "pointer", fontSize: 10 }}>✕</button>
                    </div>
                  ))}
